<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký</title>
</head>
<body>
    <h1>Đăng ký tài khoản</h1>
    <p>Điền đầy đủ thông tin bên dưới để tạo tài khoản mới.</p>

    <form action="https://basic-web-training.vercel.app/api/practice/submit/register" method="POST">
        <input type="hidden" name="formType" value="register">

        <section>
            <h2>Thông tin cá nhân</h2>
            <label>Họ: <input type="text" name="lastname" placeholder="Nguyễn" required></label>
            <label>Tên: <input type="text" name="firstname" placeholder="Văn A" required></label><br>
            <lable>Ngày sinh: <input type="date" name="birthdate" required></lable><br>
            <label>Giới tính: 
                <input type="radio" name="gender" value="male" required> Nam
                <input type="radio" name="gender" value="female" required> Nữ
                <input type="radio" name="gender" value="other" required> Khác
            </label><br>
            <label>Số điện thoại: <input type="tel" name="phone" pattern="[0-9]{10,11}" required></label>
        </section>

        <label><input type="checkbox" name="agree" value="1" required>Đồng ý điều khoản</label><br>

        <button type="reset">Nhập lại</button>
        <button type="submit">Đăng ký</button>
        <p><a href="login.html">Đã có tài khoản? Đăng nhập tại đây</a></p>
    </form> 
</body>
</html>
